name: Collect Daily Keywords

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 (UTC 00:00, 06:00, 12:00, 18:00 → KST 09:00, 15:00, 21:00, 03:00)
  workflow_dispatch:        # 수동 실행 가능

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip 캐시 (torch 휠 재다운로드 방지)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ner-torch-cpu-transformers-5.10.1

      - name: HuggingFace 모델 캐시 (modu-ner 재다운로드 방지)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-Leo97-modu-ner-v1

      - name: 라이브러리 설치
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install feedparser kiwipiepy "numpy<2" anthropic transformers==5.10.1

      - name: 키워드 수집 실행
        run: python collect.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 수집 결과 검증
        run: |
          python -c "
          import json, sys
          data = json.load(open('data/keywords.json', encoding='utf-8'))
          cats = data.get('categories', {})
          if len(cats) < 2:
              print('ERROR: 카테고리가 2개 미만입니다')
              sys.exit(1)
          for name, cat in cats.items():
              kws = cat.get('keywords', [])
              if len(kws) < 3:
                  print(f'ERROR: {name} 키워드가 {len(kws)}개로 부족합니다')
                  sys.exit(1)
              for kw in kws:
                  if not kw.get('articles'):
                      print(f'WARNING: {name}/{kw[\"word\"]}에 기사가 없습니다')
          print(f'OK: {len(cats)}개 카테고리, 총 {sum(len(c[\"keywords\"]) for c in cats.values())}개 키워드')
          "

      - name: Threads 자동 게시
        run: python post_threads.py
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

      - name: 결과 저장 (Git commit + push)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # -A: collect.py가 보관 기간(365일) 지난 history를 지우므로 삭제도 스테이징
          git add -A data/
          git commit -m "Update keywords $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')" || { echo "변경사항 없음"; exit 0; }

          # 충돌 방지: 최대 3회 재시도
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push 재시도 ($i/3)..."
            sleep 5
          done

      - name: Vercel 재배포 트리거
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"