name: Supabase Keepalive

on:
  schedule:
    - cron: '0 6 */3 * *'  # 3일마다 06:00 UTC — 7일 유휴 자동 pause 방지 (안전 마진)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Supabase ping
        run: |
          curl -fsS "$SUPABASE_URL/rest/v1/push_subscriptions?select=endpoint&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" > /dev/null
          echo "Supabase keepalive ping OK"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
